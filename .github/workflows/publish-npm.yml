name: Publish npm packages

# Tag-driven dual publish to npmjs.com and GitHub Packages.
#
# Trigger: push a tag of the form `pkg-v<semver>` (matches the package
# version field). Example:
#
#   pnpm --filter @yeheskieltame/claudelance-types version patch
#   git tag pkg-v0.1.1
#   git push origin pkg-v0.1.1
#
# The workflow builds every package in the workspace and publishes
# anything whose package.json version matches the tag. Repeating the
# tag is a no-op (npm rejects duplicate versions).

on:
  push:
    tags:
      - 'pkg-v*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Workspace filter (e.g. @yeheskieltame/claudelance-sdk). Leave blank to publish all.'
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        # version comes from "packageManager" in the root package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org/'
          scope: '@yeheskieltame'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r --filter "./packages/*" run build

      - name: Publish to npmjs.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${{ inputs.package }}" ]; then
            pnpm --filter "${{ inputs.package }}" publish --access public --no-git-checks
          else
            pnpm -r --filter "./packages/*" publish --access public --no-git-checks
          fi

      - name: Rewrite .npmrc for GitHub Packages
        # setup-node above wrote a scope binding to registry.npmjs.org;
        # pnpm prioritises that scope binding over --registry, so we have
        # to OVERWRITE the .npmrc, not append.
        run: |
          NPMRC="${RUNNER_TEMP}/.npmrc"
          {
            echo "@yeheskieltame:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=\${NODE_AUTH_TOKEN}"
          } > "$NPMRC"
          echo "NPM_CONFIG_USERCONFIG=$NPMRC" >> "$GITHUB_ENV"

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.package }}" ]; then
            pnpm --filter "${{ inputs.package }}" publish --access public --no-git-checks
          else
            pnpm -r --filter "./packages/*" publish --access public --no-git-checks
          fi

      - name: Verify published versions on npm
        # Guards against a silent publish that never lands: for a pkg-v<semver>
        # tag, assert every package whose version matches the tag is actually
        # live on npmjs (with retries for registry propagation). Hit the npmjs
        # REST API with curl, not `npm view` — the GitHub Packages step above
        # rebinds the @yeheskieltame scope in .npmrc, and that scope binding
        # overrides even `--registry`, so npm would query the wrong registry.
        if: startsWith(github.ref, 'refs/tags/pkg-v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#pkg-v}"
          echo "Verifying packages at $TAG_VERSION are live on npm..."
          FAIL=0
          for pkg_json in packages/*/package.json; do
            [ -f "$pkg_json" ] || continue
            NAME=$(node -p "require('./$pkg_json').name")
            LOCAL=$(node -p "require('./$pkg_json').version")
            [ "$LOCAL" = "$TAG_VERSION" ] || continue
            URL="https://registry.npmjs.org/${NAME/\//%2f}/$TAG_VERSION"
            PUBLISHED=""
            for _ in 1 2 3 4 5 6; do
              BODY=$(curl -fsS "$URL" 2>/dev/null || true)
              PUBLISHED=$(printf '%s' "$BODY" | jq -r '.version // empty' 2>/dev/null || echo "")
              [ "$PUBLISHED" = "$TAG_VERSION" ] && break
              sleep 5
            done
            if [ "$PUBLISHED" = "$TAG_VERSION" ]; then
              echo "OK  $NAME@$TAG_VERSION is live on npm"
            else
              echo "::error::$NAME@$TAG_VERSION not found on npm after publish"
              FAIL=1
            fi
          done
          exit $FAIL
